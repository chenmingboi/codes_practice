<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dynamic Glass</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Noto+Sans+SC:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <canvas id="aurora" aria-hidden="true"></canvas>

    <main class="stage">
      <div class="panel-grid">
        <section class="glass hero-card tilt-card">
          <div class="gloss"></div>
          <p class="eyebrow">AURORA GLASS</p>
          <h1>Blue Purple Pink</h1>
          <p class="lead">
            Smooth glass motion with refraction edge, flowing light and pointer depth.
          </p>

          <div class="metrics">
            <article class="metric">
              <p>Blur</p>
              <strong>26px</strong>
            </article>
            <article class="metric">
              <p>Theme</p>
              <strong>B/P/P</strong>
            </article>
            <article class="metric">
              <p>Frame</p>
              <strong>~60 FPS</strong>
            </article>
          </div>

          <button class="cta" type="button">Explore Liquid UI</button>
        </section>

        <section class="glass login-card tilt-card">
          <div class="gloss"></div>
          <p class="eyebrow">WELCOME BACK</p>
          <h2>Login</h2>
          <form class="login-form" action="#" method="post">
            <label>
              <span>Email</span>
              <input type="email" name="email" placeholder="hello@domain.com" />
            </label>
            <label>
              <span>Password</span>
              <input type="password" name="password" placeholder="••••••••" />
            </label>
            <button class="login-btn" type="submit">Sign In</button>
          </form>
        </section>
      </div>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
