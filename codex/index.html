<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dynamic Glass</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Noto+Sans+SC:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <canvas id="aurora" aria-hidden="true"></canvas>

    <main class="stage">
      <section class="glass" id="glass-card">
        <div class="gloss"></div>
        <p class="eyebrow">LIQUID INTERFACE</p>
        <h1>动态玻璃</h1>
        <p class="lead">
          透光、折射、流动高光和轻量 3D 视差，共同构成丝滑的动态玻璃体验。
        </p>

        <div class="metrics">
          <article class="metric">
            <p>Blur</p>
            <strong>24px</strong>
          </article>
          <article class="metric">
            <p>Motion</p>
            <strong>RAF</strong>
          </article>
          <article class="metric">
            <p>Frame</p>
            <strong>~60 FPS</strong>
          </article>
        </div>

        <button class="cta" type="button">触碰玻璃流光</button>
      </section>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
